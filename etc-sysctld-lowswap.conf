#
# /etc/sysctl.d/99-custom.conf
# Kernel parameter configuration
#
# Place custom kernel parameters here. Files in /etc/sysctl.d/ are processed
# in alphabetical order. Typically use 99-prefix for user customizations.
#
# View current settings: sysctl -a
# Apply changes: sudo sysctl -p /etc/sysctl.d/99-custom.conf
#

################################################################################
# NETWORK CONFIGURATION
################################################################################

# Enable IP forwarding (for routing)
# net.ipv4.ip_forward=1

# Enable IPv6 forwarding
# net.ipv6.conf.all.forwarding=1

# Increase number of incoming connections queue
# net.core.somaxconn=4096

# Increase number of incoming connections backlog
# net.ipv4.tcp_max_syn_backlog=4096

# Enable TCP Fast Open
# net.ipv4.tcp_fastopen=3

# Increase network device backlog
# net.core.netdev_max_backlog=4096

# TCP keepalive
# net.ipv4.tcp_keepalive_time=600
# net.ipv4.tcp_keepalive_intvl=60
# net.ipv4.tcp_keepalive_probes=5

# TCP SYN cookies (prevents SYN flood attacks)
# net.ipv4.tcp_syncookies=1

# Restrict ICMP redirects
# net.ipv4.conf.all.accept_redirects=0
# net.ipv4.conf.default.accept_redirects=0

# Ignore ICMP ping requests
# net.ipv4.icmp_echo_ignore_all=0

################################################################################
# SECURITY
################################################################################

# Restrict kernel module loading (requires reboot to enable/disable modules)
# kernel.modules_disabled=1

# Hide kernel pointers in dmesg
# kernel.kptr_restrict=2

# Hide kernel logs from unprivileged users
# kernel.dmesg_restrict=1

# Restrict access to kernel logs
# kernel.printk=3 3 3 3

# Restrict ptrace scope
# kernel.yama.ptrace_scope=2

# Enable SELinux if installed
# kernel.selinux=1

# Restrict core dumps
# kernel.core_uses_pid=1

# Disable magic SysRq key (if not needed for emergency debugging)
# kernel.sysrq=0

################################################################################
# MEMORY
################################################################################

# Virtual memory swappiness (0-100, lower = less swap usage)
# 10 = minimize swap, 60 = default, 100 = maximize swap
# vm.swappiness=10

# Page cache pressure (10 = prefer cache, 100 = prefer swap)
# vm.vfs_cache_pressure=50

# Memory overcommit policy
# 0 = heuristic, 1 = always, 2 = never
# vm.overcommit_memory=1

# Memory overcommit ratio
# vm.overcommit_ratio=50

# Dirty page writeback behavior
# vm.dirty_ratio=10
# vm.dirty_background_ratio=5

# Page cache writeback timing (in centiseconds)
# vm.dirty_writeback_centisecs=1500
# vm.dirty_expire_centisecs=3000

################################################################################
# FILE SYSTEM
################################################################################

# Increase maximum number of open file descriptors
# fs.file-max=2097152

# Increase number of file watchers (for development tools)
# fs.inotify.max_user_watches=524288

# Increase inode cache
# fs.inode-nr=0

################################################################################
# PROCESS/SCHEDULER
################################################################################

# Panic on out-of-memory condition
# vm.panic_on_oom=0

# Enable core dumps (if not using systemd coredumpctl)
# kernel.core_pattern=core

# Increase PID maximum
# kernel.pid_max=65535

################################################################################
# PERFORMANCE TUNING
################################################################################

# CPU frequency scaling governor (ondemand, performance, powersave, etc.)
# Note: Usually set via cpufreq governor, not here
# cpufreq.default_governor=ondemand

# Increase timer resolution precision (nanoseconds)
# kernel.hrtimer_resolution=1

# TCP buffer sizes (min, default, max in bytes)
# net.ipv4.tcp_rmem=4096 131072 6291456
# net.ipv4.tcp_wmem=4096 16384 4194304
# net.core.rmem_max=134217728
# net.core.wmem_max=134217728
