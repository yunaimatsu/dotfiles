[main]
font=Noto Sans Mono:size=12

[colors-dark]
# Opacity
alpha=1.0
background=000000
foreground=888888

## Selection colors
selection-foreground=eeeeee
selection-background=1e1e1e

## Scrollback indicator (foreground background)
scrollback-indicator=888888 000000

## URL colors
urls=2a4a9b

## ANSI palette: dark accents on black
regular0=000000
regular1=8b1a1a
regular2=1a6b1a
regular3=8b8b1a
regular4=2a4a9b
regular5=6a1a8b
regular6=1a6b6b
regular7=888888
bright0=333333
bright1=a63333
bright2=2a8b2a
bright3=a6a633
bright4=3a5fbf
bright5=8b33a6
bright6=2a8b8b
bright7=bbbbbb

[key-bindings]
clipboard-copy=Super+c
clipboard-paste=Super+v

scrollback-up-line=Control+Shift+k
scrollback-down-line=Control+Shift+j

scrollback-up-page=Control+Shift+Page_Up
scrollback-down-page=Control+Shift+Page_Down

[text-bindings]
\x0c=Super+l
\x0b=Super+k
