LANG="C.UTF-8"
# This file sets the default locale for the entire system.
# Format: LANG=locale_name.charset
#
# Common examples:
# en_US.UTF-8         (US English)
# en_GB.UTF-8         (British English)
# de_DE.UTF-8         (German)
# fr_FR.UTF-8         (French)
# ja_JP.UTF-8         (Japanese)
# zh_CN.UTF-8         (Simplified Chinese)
# ru_RU.UTF-8         (Russian)
#
# View available locales with: locale -a
# Generate additional locales by uncommenting in /etc/locale.gen and running: locale-gen
#

LANG=en_US.UTF-8

# Optional: Set additional locale variables for specific purposes
# LC_CTYPE: Character classification and case conversion
# LC_NUMERIC: Number formatting
# LC_TIME: Date and time formatting
# LC_COLLATE: String comparison and collation
# LC_MONETARY: Currency formatting
# LC_MESSAGES: System message language
# LC_PAPER: Paper size
# LC_NAME: Person name formatting
# LC_ADDRESS: Address formatting
# LC_TELEPHONE: Telephone number formatting
# LC_MEASUREMENT: Measurement units
#
# LC_ALL=en_US.UTF-8
# LC_NUMERIC=en_US.UTF-8
# LC_TIME=en_US.UTF-8
# LC_MONETARY=en_US.UTF-8
# LC_MESSAGES=en_US.UTF-8
