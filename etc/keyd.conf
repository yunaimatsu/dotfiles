[ids]
* = *

[main]
# Physical remapping
control = layer(meta)
meta = layer(ctrl)

# Disable extra keys
esc = noop
1 = noop
2 = noop
3 = noop
4 = noop
5 = noop
6 = noop
7 = noop
8 = noop
9 = noop
0 = noop
minus = noop
equal = noop
backslash = noop
grave = noop
tab = noop
backspace = noop
delete = noop
