[ids]
* = *

[main]
# Absorb differences between keyboard devices
# Expecting HHKB (Mac mode)
control = layer(meta)
meta = layer(control)
leftalt = layer(alt)
rightalt = layer(alt)

# Disable unused keys
tab = noop
esc = noop
1 = noop
2 = noop
3 = noop
4 = noop
5 = noop
6 = noop
7 = noop
8 = noop
9 = noop
0 = noop
minus = noop
equal = noop
backslash = noop
grave = noop
backspace = noop
left = noop
up = noop
right = noop
down = noop

[shift]
slash = backslash

[meta:M]
# Arrow keys
b = left
p = up
f = right
n = down
# Emacs
a = home
e = end
# Tab navigation
t = tab
# Delete
h = backspace
d = delete
u = macro(S-home delete)
k = macro(S-end delete)
. = escape

[alt:A]
# Number keys
space = 0
m = 1
, = 2
. = 3
j = 4
k = 5
l = 6
u = 7
i = 8
o = 9
p = S-equal
semicolon = minus
slash = equal

apostrophe = grave

a = S-2
[ = S-9
] = S-0

# Exclamation / Question marks
## ! (Exclamation mark)
b = S-1
## ? (question mark)
q = S-/

# Control symbols
## # (Hash)
h = S-3
## $ (Dollar)
d = S-4
## % (Percent)
x = S-5
## ^ (Caret) 
c = S-6
# stdin symbols
## & (Ampersand)
e = S-7
t = S-grave
## | (Pipe)
v = |
## * (Star)
s = S-8

y = S-minus

[control:C]
a = C-a
b = C-b
c = C-c
d = C-d
e = C-e
f = C-f
g = C-g
h = C-h
i = C-i
j = C-j
k = C-k
l = C-l
m = C-m
n = C-n
o = C-o
p = C-p
q = C-q
r = C-r
s = C-s
t = C-t
u = C-u
v = C-v
w = C-w
x = C-x
y = C-y
z = C-z

[meta+control]
j = C-tab
k = C-S-tab
