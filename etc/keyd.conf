[meta:M]
[ = M-[
] = M-]
semicolon = M-semicolon
enter = M-enter
, = M-,
. = escape
space = M-space
a = home
b = left
d = delete
e = end
f = right
h = backspace
k = macro(S-end delete)
n = down
p = up
t = tab
u = macro(S-home delete)

[meta+shift]
[ = M-S-[
] = M-S-]
semicolon = M-S-semicolon
' = M-S-'
enter = M-S-enter
, = M-S-,
. = M-S-.
space = M-S-space
a = M-S-a
b = M-S-b
c = M-S-c
d = M-S-d
e = M-S-e
f = M-S-f
g = M-S-g
h = M-S-h
i = M-S-i
j = M-S-j
k = M-S-k
l = M-S-l
m = M-S-m
n = M-S-n
o = M-S-o
p = M-S-p
q = M-S-q
r = M-S-r
s = M-S-s
t = S-tab
u = M-S-u
v = M-S-v
w = M-S-w
x = M-S-x
y = M-S-y
z = M-S-z

[ctrl:c]
[ = S-9
] = S-0
