[options]
SigLevel = PackageOptional
HoldPkg = pacman glibc
IgnorePkg = linux
IgnoreGroup = kde
NoUpgrade = etc/issue
NoExtract = usr/share/doc/*
Architecture = auto
CheckSpace
UseSyslog
VerbosePkgLists
Color
ParallelDownloads = 5
CacheDir = /var/cache/pacman/pkg/
LogFile = /var/log/pacman.log
GPGDir = /etc/pacman.d/gnupg/

[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist

[multilib]
Include = /etc/pacman.d/mirrorlist

#
# /etc/pacman.conf
# Arch Linux package manager configuration
#

[options]
# The following paths are commented out with their default values listed:
#RootDir     = /
#DBPath      = /var/lib/pacman/
#CacheDir    = /var/cache/pacman/pkg/
#LogFile     = /var/log/pacman.log
#GPGDir      = /etc/pacman.d/gnupg/
#HookDir     = /etc/pacman.d/hooks/

# Download mirrors
Architecture = auto

# Verbosity
#UseSyslog
Color
ILoveCandy

# Parallel downloads (speeds up package downloads)
ParallelDownloads = 5

# Signature checking
SigLevel = Required DatabaseOptional
LocalFileSigLevel = Optional
#RemoteFileSigLevel = Required

# Package integrity
CheckSpace
VerbosePkgLists

# Pacman won't upgrade packages in the IgnorePkg array
# IgnorePkg   = 

# Ignore a group instead of individual packages
# IgnoreGroup = 

# Disable autosave of the old version of a package
NoUpgrade   = 
# NoExtract   = 

# Repositories
# The testing repositories are disabled by default. To enable, uncomment the
# repo name header and Include lines. You can add preferred servers immediately
# after the header, and they will be used before the default mirrors.

[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist

#[testing]
#Include = /etc/pacman.d/mirrorlist

[community]
Include = /etc/pacman.d/mirrorlist

#[community-testing]
#Include = /etc/pacman.d/mirrorlist

# Multilib repository (32-bit support)
#[multilib-testing]
#Include = /etc/pacman.d/mirrorlist

#[multilib]
#Include = /etc/pacman.d/mirrorlist

# Custom repositories (add your own)
# [custom]
# Server = file:///home/custompkgs
