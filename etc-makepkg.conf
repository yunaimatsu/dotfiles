#!/hint/bash
# shellcheck disable=2034

#
# /etc/makepkg.conf
#

#########################################################################
# SOURCE ACQUISITION
#########################################################################
#
#-- The download utilities that makepkg should use to acquire sources
#  Format: 'protocol::agent'
DLAGENTS=('file::/usr/bin/curl -qgC - -o %o %u'
          'ftp::/usr/bin/curl -qgfC - --ftp-pasv --retry 3 --retry-delay 3 -o %o %u'
          'http::/usr/bin/curl -qgb "" -fLC - --retry 3 --retry-delay 3 -o %o %u'
          'https::/usr/bin/curl -qgb "" -fLC - --retry 3 --retry-delay 3 -o %o %u'
          'rsync::/usr/bin/rsync --no-motd -z %u %o'
          'scp::/usr/bin/scp -C %u %o')

# Other common tools:
# /usr/bin/snarf
# /usr/bin/lftpget -c
# /usr/bin/wget

#-- The package required by makepkg to download VCS sources
#  Format: 'protocol::package'
VCSCLIENTS=('bzr::breezy'
            'fossil::fossil'
            'git::git'
            'hg::mercurial'
            'svn::subversion')

#########################################################################
# ARCHITECTURE, COMPILE FLAGS
#########################################################################
#
CARCH="x86_64"
CHOST="x86_64-pc-linux-gnu"

#NPROC=2

#-- Compiler and Linker Flags
#CPPFLAGS=""
CFLAGS="-march=x86-64 -mtune=generic -O2 -pipe -fno-plt -fexceptions \
        -Wp,-D_FORTIFY_SOURCE=3 -Wformat -Werror=format-security \
        -fstack-clash-protection -fcf-protection \
        -fno-omit-frame-pointer -mno-omit-leaf-frame-pointer"
CXXFLAGS="$CFLAGS -Wp,-D_GLIBCXX_ASSERTIONS"
LDFLAGS="-Wl,-O1 -Wl,--sort-common -Wl,--as-needed -Wl,-z,relro -Wl,-z,now \
         -Wl,-z,pack-relative-relocs"
LTOFLAGS="-flto=auto"
#-- Make Flags: change this for DistCC/SMP systems
#MAKEFLAGS="-j2"
#-- Debugging flags
DEBUG_CFLAGS="-g"
DEBUG_CXXFLAGS="$DEBUG_CFLAGS"

#########################################################################
# BUILD ENVIRONMENT
#########################################################################
#
# Makepkg defaults: BUILDENV=(!distcc !color !ccache check !sign)
#  A negated environment option will do the opposite of the comments below.
#
#-- distcc:   Use the Distributed C/C++/ObjC compiler
#-- color:    Colorize output messages
#-- ccache:   Use ccache to cache compilation
#-- check:    Run the check() function if present in the PKGBUILD
#-- sign:     Generate PGP signature file
#
BUILDENV=(!distcc color !ccache check !sign)
#
#-- If using DistCC, your MAKEFLAGS will also need modification. In addition,
#-- specify a space-delimited list of hosts running in the DistCC cluster.
#DISTCC_HOSTS=""
#
#-- Specify a directory for package building.
#BUILDDIR=/tmp/makepkg

#########################################################################
# GLOBAL PACKAGE OPTIONS
#   These are default values for the options=() settings
#########################################################################
#
# Makepkg defaults:
# OPTIONS=(!strip docs libtool staticlibs emptydirs !zipman !purge !debug !lto !autodeps)
#  A negated option will do the opposite of the comments below.
#
#-- strip:      Strip symbols from binaries/libraries
#-- docs:       Save doc directories specified by DOC_DIRS
#-- libtool:    Leave libtool (.la) files in packages
#-- staticlibs: Leave static library (.a) files in packages
#-- emptydirs:  Leave empty directories in packages
#-- zipman:     Compress manual (man and info) pages in MAN_DIRS with gzip
#-- purge:      Remove files specified by PURGE_TARGETS
#-- debug:      Add debugging flags as specified in DEBUG_* variables
#-- lto:        Add compile flags for building with link time optimization
#-- autodeps:   Automatically add depends/provides
#
OPTIONS=(strip docs !libtool !staticlibs emptydirs zipman purge debug lto)

#-- File integrity checks to use. Valid: md5, sha1, sha224, sha256, sha384, sha512, b2
INTEGRITY_CHECK=(sha256)
#-- Options to be used when stripping binaries. See `man strip' for details.
STRIP_BINARIES="--strip-all"
#-- Options to be used when stripping shared libraries. See `man strip' for details.
STRIP_SHARED="--strip-unneeded"
#-- Options to be used when stripping static libraries. See `man strip' for details.
STRIP_STATIC="--strip-debug"
#-- Manual (man and info) directories to compress (if zipman is specified)
MAN_DIRS=(usr{,/local}{,/share}/{man,info})
#-- Doc directories to remove (if !docs is specified)
DOC_DIRS=(usr/{,local/}{,share/}{doc,gtk-doc})
#-- Files to be removed from all packages (if purge is specified)
PURGE_TARGETS=(usr/{,share}/info/dir .packlist *.pod)
#-- Directory to store source code in for debug packages
DBGSRCDIR="/usr/src/debug"
#-- Prefix and directories for library autodeps
LIB_DIRS=('lib:usr/lib' 'lib32:usr/lib32')

#########################################################################
# PACKAGE OUTPUT
#########################################################################
#
# Default: put built package and cached source in build directory
#
#-- Destination: specify a fixed directory where all packages will be placed
#PKGDEST=/home/packages
#-- Source cache: specify a fixed directory where source files will be cached
#SRCDEST=/home/sources
#-- Source packages: specify a fixed directory where all src packages will be placed
#SRCPKGDEST=/home/srcpackages
#-- Log files: specify a fixed directory where all log files will be placed
#LOGDEST=/home/makepkglogs
#-- Packager: name/email of the person or organization building packages
#PACKAGER="John Doe <john@doe.com>"
#-- Specify a key to use for package signing
#GPGKEY=""

#########################################################################
# COMPRESSION DEFAULTS
#########################################################################
#
COMPRESSGZ=(gzip -c -f -n)
COMPRESSBZ2=(bzip2 -c -f)
COMPRESSXZ=(xz -c -z -)
COMPRESSZST=(zstd -c -T0 -)
COMPRESSLRZ=(lrzip -q)
COMPRESSLZO=(lzop -q)
COMPRESSZ=(compress -c -f)
COMPRESSLZ4=(lz4 -q)
COMPRESSLZ=(lzip -c -f)

#########################################################################
# EXTENSION DEFAULTS
#########################################################################
#
PKGEXT='.pkg.tar.zst'
SRCEXT='.src.tar.gz'

#########################################################################
# OTHER
#########################################################################
#
#-- Command used to run pacman as root, instead of trying sudo and su
#PACMAN_AUTH=()
# vim: set ft=sh ts=2 sw=2 et:

#
# /etc/makepkg.conf
# Build configuration for ABS and yaourt
# See the makepkg.conf man page for more options on how to REALLY customize build!

#-- The download utility used to get files in makepkg and makepkg itself
# If --(re)download all source files are downloaded
# If --check SKIP :: control interior silence, show progress only on fail
DLAGENTS=('https::/usr/bin/curl -gqC - --retry 3 --retry-delay 3 -o %o %u'
          'http::/usr/bin/curl -gqC - --retry 3 --retry-delay 3 -o %o %u'
          'ftp::/usr/bin/curl -gqC - --retry 3 --retry-delay 3 -o %o %u'
          'file::/usr/bin/cp %u %o')

# Other common tools:
# /usr/bin/wget
# /usr/bin/git
# /usr/bin/hg
# /usr/bin/svn

#-- The package used to extract source files
# COMPRESSGZ=(gzip -c -f)
# COMPRESSBZ2=(bzip2 -c -f)
# COMPRESSXZ=(xz -c -z -)
# COMPRESSZST=(zstd -c -z -)
# COMPRESSLZ=(lzip -c -f)
# COMPRESSLZO=(lzop -c -f)
# COMPRESSZ=(compress -c -f)

#-- Git command to clone packages
#GITFLAGS=()

#-- Fallback download protocol (all)
#FETCH_URL_FAIL_PERCENT=0

#-- Signature level for source validation by makepkg
# Valid options: 'Never', 'Optional', 'Preferred', 'TrustAll', 'Required'
SRCPKGDEST=/home/makepkgbuild
PKGDEST=/home/makepkg
SRCDEST=/home/makepkgsrc
LOGDEST=/home/makepkg

#-- Specify a fixed directory where all src files are extracted
# When this option is set, successful extractions will restore
# their state time to the present before previous to extraction.
SRCDIR=/tmp/makepkg

#-- Specify a fixed directory where all packages will be built.
# When this option is set, successful builds will restore
# their state time to the present before previous to build.
BUILDDIR=/tmp/makepkg

#-- Enable fakeroot for building packages as a non-root user
#USEFAKEROOT="y"

#-- Compression defaults have the highest ratio
# Note: This requires custom PKGEXT values set below; full rebuild required
# for matching packages using *any* compression type apart from gzip
# The text after the equals sign are the full set of options supported by each
# program (run the tool with --help to verify). A few other useful options:
#   bzip2: -9 or -1 through -9 (default of 9)
#   zstd: -10 through -19 (default of 19)
#   xz: -9
COMPRESSGZ=(gzip -c -f -9)
COMPRESSBZ2=(bzip2 -c -f -9)
COMPRESSXZ=(xz -c -z - -9)
COMPRESSZST=(zstd -c -z -9)
COMPRESSLZ=(lzip -c -f -9)
COMPRESSLZO=(lzop -c -f -9)
COMPRESSZ=(compress -c -f -16)

#-- Archive format. Valid entries include '.pkg.tar', '.pkg.tar.gz', '.pkg.tar.bz2',
# '.pkg.tar.xz', '.pkg.tar.zst'. (.pkg.tar is the default.)
PKGEXT='.pkg.tar.zst'
SRCEXT='.src.tar.zst'

#-- GPG key used to sign packages
# Format: 0x<ident>
#GPGSIGN=()
#SIGNPKG=""

########################################################################
# BUILD ENVIRONMENT
########################################################################
#
# Defaults: BUILDENV=(!distcc !color !ccache check !sign)
#
# A negated environment option will do the opposite of the comments below.
#
#-- allow verbose build output
#BUILDENV+=('verbose')
#
#-- disable colorized output messages
#BUILDENV+=(!color)
#
#-- enable ccache for builds via ccache. See ccache documentation for more info.
#BUILDENV+=(ccache)
#
#-- enable distcc for distributed compilation. Points to /etc/distcc/hosts by default.
#BUILDENV+=(distcc)
#
#-- Run the check() function if present in the PKGBUILD; run with --nocheck to disable
#BUILDENV+=(check)
#
#-- Sign packages when built, run with --nosign to disable
#BUILDENV+=(sign)

BUILDENV=(!distcc !color !ccache check !sign)

#-- Number of parallel jobs that make will use. A common rule of thumb is if set to
# "-j $(nproc)". By default, makepkg detects the number of on-line processors
# and runs $(nproc) parallel jobs.
#MAKEFLAGS="-j2"

#-- Bash command executed in fakeroot before running prepare(), build(), package(), etc.
#BASHRC_FUNCTIONS=()

########################################################################
# ARCHITECTURE, COMPILE FLAGS
########################################################################
#
CARCH="x86_64"
CHOST="x86_64-pc-linux-gnu"

#-- Compiler and compilation flags. Note these have no impact if BUILDENV is changed!
# Most users will want to leave these options alone to benefit from upstream Arch optimizations
#
CPPFLAGS="-D_FORTIFY_SOURCE=2"
CFLAGS="-march=x86-64 -mtune=generic -O2 -pipe -fno-plt -fexceptions \
        -Wp,-D_FORTIFY_SOURCE=2 -Wformat -Werror=format-security \
        -fstack-clash-protection -fcf-protection"
CXXFLAGS="$CFLAGS"
LDFLAGS="-Wl,-O1,--sort-common,--as-needed,-z,relro,-z,now"
LDLIBS=""

#-- Make flags: change this for DistCC/SMP systems
#MAKEFLAGS="-j2"

#-- Debugging flags
DEBUG_CFLAGS="-g -fvar-tracking-assignments"
DEBUG_CXXFLAGS="$DEBUG_CFLAGS"
#DEBUG_RUSTFLAGS="-C debuginfo=2"

########################################################################
# SAFETY CHECKS
########################################################################
#
#-- Enable checking for reinforced source integrity.
# Accepts 'none', 'md5', 'sha1', 'sha224', 'sha256', 'sha384', 'sha512' or
# any combination of these separated by spaces
#CHECK_BUILDENV!=(realpath)
#INTEGRITYCHECKS=(md5)
INTEGRITYCHECKS=(sha256)
